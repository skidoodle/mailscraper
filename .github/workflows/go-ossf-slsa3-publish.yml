name: SLSA GoReleaser
on:
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_goreleaser_slsa3.yml@v2.1.0
    with:
      go-version: 1.26.2
      goreleaser-version: latest
      config-file: .slsa-goreleaser.yml
